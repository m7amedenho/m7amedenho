  <text x="155" y="452" class="mono line l18" font-size="12.5" fill="#e2d9f3">→  </text>
  <text x="183" y="452" class="mono line l18" font-size="12.5" fill="#fbbf24">PostgreSQL · MySQL · Prisma · TiDB · ChromaDB</text>

