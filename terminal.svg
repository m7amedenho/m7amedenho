      .mono { font-family: "JetBrains Mono", "Courier New", monospace; }

      .line { opacity: 0; }

      .l00 { animation: fadein 0.1s 0.2s forwards; }
      .l01 { animation: fadein 0.1s 0.5s forwards; }
      .l02 { animation: fadein 0.1s 0.8s forwards; }
      .l03 { animation: fadein 0.1s 1.1s forwards; }
      .l04 { animation: fadein 0.1s 1.4s forwards; }
      .l05 { animation: fadein 0.1s 1.7s forwards; }
      .l06 { animation: fadein 0.1s 2.0s forwards; }
      .l07 { animation: fadein 0.1s 2.3s forwards; }
      .l08 { animation: fadein 0.1s 2.6s forwards; }
      .l09 { animation: fadein 0.1s 2.9s forwards; }
      .l10 { animation: fadein 0.1s 3.2s forwards; }
      .l11 { animation: fadein 0.1s 3.5s forwards; }
      .l12 { animation: fadein 0.1s 3.8s forwards; }
      .l13 { animation: fadein 0.1s 4.1s forwards; }
      .l14 { animation: fadein 0.1s 4.4s forwards; }
      .l15 { animation: fadein 0.1s 4.7s forwards; }
      .l16 { animation: fadein 0.1s 5.0s forwards; }
      .l17 { animation: fadein 0.1s 5.3s forwards; }
      .l18 { animation: fadein 0.1s 5.6s forwards; }
      .l19 { animation: fadein 0.1s 5.9s forwards; }
      .l20 { animation: fadein 0.1s 6.2s forwards; }
      .l21 { animation: fadein 0.1s 6.5s forwards; }
      .l22 { animation: fadein 0.1s 6.8s forwards; }
      .l23 { animation: fadein 0.1s 7.1s forwards; }

      .bar-fill {
        animation: progress 1.2s 0.4s ease-out forwards;
        width: 0;
      }

      .cursor {
        animation: blink 0.8s step-end infinite;
      }

      @keyframes fadein { to { opacity: 1; } }
      @keyframes progress { to { width: 680px; } }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    </style>
  </defs>

  <!-- Background -->
  <rect width="780" height="520" rx="10" fill="#0d0d12"/>

  <!-- Title bar -->
