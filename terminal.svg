  <text x="65" y="271" class="mono line l09" font-size="12.5" fill="#86efac">  "Agricultural management platform"</text>
  <text x="65" y="290" class="mono line l10" font-size="12.5" fill="#86efac">  "Multi-tenant SaaS accounting system"</text>
