  <text x="155" y="433" class="mono line l17" font-size="12.5" fill="#e2d9f3">→  </text>
  <text x="183" y="433" class="mono line l17" font-size="12.5" fill="#34d399">.NET · ABP · Laravel · FastAPI · Node.js</text>

